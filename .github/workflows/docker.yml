name: Slackware Docker Images

on:
  workflow_dispatch:
  schedule:
    - cron: 0 3 * * *
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

concurrency:
  group: docker-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: false

env:
  # renovate: datasource=docker depName=alpine versioning=loose
  ALPINE_IMAGE: 3.24.1@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
  # renovate: datasource=github-releases depName=docker/buildx
  BUILDX_VERSION: 'v0.35.0'
  ARMEDSLACK_VERSIONS: '["12.2","13.1","13.37"]'
  SLACKWAREARM_VERSIONS: '["14.0","14.1","14.2","15.0"]'
  SLACKWAREAARCH64_VERSIONS: '["current"]'
  PRE_SLACKWARE64_VERSIONS: '["8.1","9.0","9.1","10.0","10.1","10.2","11.0","12.0","12.1","12.2"]'
  LATEST_VERSION: '15.0'
  REGISTRY_IMAGE: ${{ github.repository_owner }}/slackware

jobs:
  docker:
    strategy:
      matrix:
        version: ['8.1', '9.0', '9.1', '10.0', '10.1', '10.2', '11.0', '12.0', '12.1', '12.2', '13.0', '13.1', '13.37', '14.0', '14.1', '14.2', '15.0', current]
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false
          persist-credentials: false

      - name: Prep downloads
        run: |
          mkdir -p changelogs

      - name: Fetch slackware ChangeLog
        run: |
          curl -s -f -o changelogs/ChangeLog.txt.386 https://slackware.osuosl.org/slackware-${{ matrix.version }}/ChangeLog.txt

      - name: Fetch slackware64 ChangeLog
        if: false == contains(fromJson(env.PRE_SLACKWARE64_VERSIONS), matrix.version)
        run: |
          curl -s -f -o changelogs/ChangeLog.txt.amd64 https://slackware.osuosl.org/slackware64-${{ matrix.version }}/ChangeLog.txt

      - name: Fetch armedslack ChangeLog
        if: contains(fromJson(env.ARMEDSLACK_VERSIONS), matrix.version)
        run: |
          curl -s -f -o changelogs/ChangeLog.txt.arm https://slackware.uk/slackwarearm/armedslack-${{ matrix.version }}/ChangeLog.txt

      - name: Fetch slackwarearm ChangeLog
        if: contains(fromJson(env.SLACKWAREARM_VERSIONS), matrix.version)
        run: |
          curl -s -f -o changelogs/ChangeLog.txt.arm https://slackware.uk/slackwarearm/slackwarearm-${{ matrix.version }}/ChangeLog.txt

      - name: Fetch slackwareaarch64 ChangeLog
        if: contains(fromJson(env.SLACKWAREAARCH64_VERSIONS), matrix.version)
        run: |
          curl -s -f -o changelogs/ChangeLog.txt.arm https://slackware.uk/slackwarearm/slackwareaarch64-${{ matrix.version }}/ChangeLog.txt

      - name: Restore Base Tarballs (PR)
        id: cache-base-tarballs
        if: github.event_name == 'pull_request'
        uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: base_tarballs/
          key: ${{ runner.os }}-base-tarballs-${{ matrix.version }}-${{ hashFiles('**/changelogs/ChangeLog*', '**/scripts/build_base_image.sh') }}

      - name: Cache Base Tarballs
        id: cache-base-tarballs-push
        if: github.event_name != 'pull_request'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: base_tarballs/
          key: ${{ runner.os }}-base-tarballs-${{ matrix.version }}-${{ hashFiles('**/changelogs/ChangeLog*', '**/scripts/build_base_image.sh') }}

      - name: Clear stale base tarball caches
        if: github.event_name != 'pull_request' && steps.cache-base-tarballs-push.outputs.cache-hit != 'true'
        run: |
          gh cache list --repo "${{ github.repository }}" --limit 200 --ref refs/heads/master --key ${{ runner.os }}-base-tarballs-${{ matrix.version }} | cut -f 1 | parallel -I xx gh cache delete --repo "${{ github.repository }}" xx || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Determine base tarball cache state
        id: cache-base-tarballs-state
        run: |
          if [ "${{ steps.cache-base-tarballs.outputs.cache-hit }}" = "true" ] || [ "${{ steps.cache-base-tarballs-push.outputs.cache-hit }}" = "true" ] ; then
            printf 'cache-hit=true\n' >> "$GITHUB_OUTPUT"
          else
            printf 'cache-hit=false\n' >> "$GITHUB_OUTPUT"
          fi

      - name: Configure binfmt image
        run: |
          BINFMT_IMAGE="$(awk '/^FROM / {print $2}' binfmt/Dockerfile)"
          printf "BINFMT_IMAGE=%s\n" "$BINFMT_IMAGE" >> "$GITHUB_ENV"

      - name: Configure buildkit image
        run: |
          BUILDKIT_IMAGE="$(awk '/^FROM / {print $2}' buildkit/Dockerfile)"
          printf "BUILDKIT_IMAGE=%s\n" "$BUILDKIT_IMAGE" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          image: ${{ env.BINFMT_IMAGE }}
          cache-image: false

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
        with:
          version: ${{ env.BUILDX_VERSION }}
          driver-opts: image=${{ env.BUILDKIT_IMAGE }}

      - name: Login to DockerHub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build slackware tarball
        if: steps.cache-base-tarballs-state.outputs.cache-hit != 'true'
        run: |
          docker run --privileged --security-opt apparmor:unconfined --rm \
            -e RELEASENAME="slackware" -e ARCH="i586" -e VERSION=${{ matrix.version }} -e CHOWN_TO="$(id -u):$(id -g)" \
            -v "$(pwd):/data" -v "$(pwd)/scripts:/scripts" alpine:${{ env.ALPINE_IMAGE }} \
            sh /scripts/build_base_image.sh

          cp slackware-${{ matrix.version }}.tar base_tarballs/

      - name: Build slackware64 tarball
        if: steps.cache-base-tarballs-state.outputs.cache-hit != 'true' && false == contains(fromJson(env.PRE_SLACKWARE64_VERSIONS), matrix.version)
        run: |
          docker run --privileged --security-opt apparmor:unconfined --rm \
            -e RELEASENAME="slackware64" -e ARCH="x86_64" -e VERSION=${{ matrix.version }} -e CHOWN_TO="$(id -u):$(id -g)" \
            -v "$(pwd):/data" -v "$(pwd)/scripts:/scripts" alpine:${{ env.ALPINE_IMAGE }} \
            sh /scripts/build_base_image.sh

          cp slackware64-${{ matrix.version }}.tar base_tarballs/

      - name: Build armedslack tarball
        if: steps.cache-base-tarballs-state.outputs.cache-hit != 'true' && contains(fromJson(env.ARMEDSLACK_VERSIONS), matrix.version)
        run: |
          CHECKSUMS="yes"

          if [ "${{ matrix.version }}" = "13.1" ] ; then
            CHECKSUMS="yes-no-checksums-gpg"
          fi

          docker run --privileged --security-opt apparmor:unconfined --rm \
            -e CHECKSUMS="$CHECKSUMS" \
            -e RELEASENAME="armedslack" -e ARCH="arm" -e VERSION=${{ matrix.version }} -e CHOWN_TO="$(id -u):$(id -g)" \
            -v "$(pwd):/data" -v "$(pwd)/scripts:/scripts" alpine:${{ env.ALPINE_IMAGE }} \
            sh /scripts/build_base_image.sh

          mv armedslack-${{ matrix.version }}.tar slackwarearm-${{ matrix.version }}.tar
          cp slackwarearm-${{ matrix.version }}.tar base_tarballs/

      - name: Build slackwarearm tarball
        if: steps.cache-base-tarballs-state.outputs.cache-hit != 'true' && contains(fromJson(env.SLACKWAREARM_VERSIONS), matrix.version)
        run: |
          CHECKSUMS="yes"

          if [ "${{ matrix.version }}" = "14.1" ] ; then
            CHECKSUMS="yes-no-checksums-gpg"
          fi

          docker run --privileged --security-opt apparmor:unconfined --rm \
            -e CHECKSUMS="$CHECKSUMS" \
            -e RELEASENAME="slackwarearm" -e ARCH="arm" -e VERSION=${{ matrix.version }} -e CHOWN_TO="$(id -u):$(id -g)" \
            -v "$(pwd):/data" -v "$(pwd)/scripts:/scripts" alpine:${{ env.ALPINE_IMAGE }} \
            sh /scripts/build_base_image.sh

          cp slackwarearm-${{ matrix.version }}.tar base_tarballs/

      - name: Build slackwareaarch64 tarball
        if: steps.cache-base-tarballs-state.outputs.cache-hit != 'true' && contains(fromJson(env.SLACKWAREAARCH64_VERSIONS), matrix.version)
        run: |
          docker run --privileged --security-opt apparmor:unconfined --rm \
            -e RELEASENAME="slackwareaarch64" -e ARCH="aarch64" -e VERSION=${{ matrix.version }} -e CHOWN_TO="$(id -u):$(id -g)" \
            -v "$(pwd):/data" -v "$(pwd)/scripts:/scripts" alpine:${{ env.ALPINE_IMAGE }} \
            sh /scripts/build_base_image.sh

          cp slackwareaarch64-${{ matrix.version }}.tar base_tarballs/

      - name: Restore prerequisites
        if: steps.cache-base-tarballs-state.outputs.cache-hit == 'true'
        run: |
          cp base_tarballs/*tar .

      - name: Compute packages hash
        id: compute-packages-hash
        if: github.event_name != 'pull_request' && steps.cache-base-tarballs-state.outputs.cache-hit != 'true'
        run: |
          set -o pipefail
          hash_input=""
          for tarball in slackware-${{ matrix.version }}.tar slackware64-${{ matrix.version }}.tar slackwarearm-${{ matrix.version }}.tar slackwareaarch64-${{ matrix.version }}.tar ; do
            [ -f "$tarball" ] || continue
            manifests=$(tar -tf "$tarball" | grep -E '\./var/(log|lib/pkgtools)/packages/.')
            if [ -z "$manifests" ] ; then
              printf 'No package manifests found in %s\n' "$tarball" 1>&2
              exit 1
            fi
            arch_hash=$(printf '%s\n' "$manifests" | sed 's|.*/||' | sort | sha256sum | cut -d' ' -f1)
            hash_input="${hash_input}${tarball}:${arch_hash}\n"
          done
          packages_hash=$(printf '%b' "$hash_input" | sha256sum | cut -d' ' -f1)
          printf 'packages_hash=%s\n' "$packages_hash" >> "$GITHUB_OUTPUT"

      - name: Check if packages changed since last push
        id: packages-pushed-cache
        if: github.event_name != 'pull_request' && steps.cache-base-tarballs-state.outputs.cache-hit != 'true'
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .packages-pushed-sentinel
          key: ${{ runner.os }}-packages-pushed-${{ matrix.version }}-${{ steps.compute-packages-hash.outputs.packages_hash }}

      - name: Compute docker platforms
        run: |
          VERSION="${{ matrix.version }}" ./.github/workflows/bin/configure_docker_platforms.sh

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=raw,value=${{ matrix.version }}
            type=raw,value=latest,enable=${{ matrix.version == env.LATEST_VERSION }}

      - name: Build and push
        if: github.event_name != 'pull_request' && steps.cache-base-tarballs-state.outputs.cache-hit != 'true' && steps.packages-pushed-cache.outputs.cache-hit != 'true'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          push: true
          platforms: ${{ env.docker_platforms }}
          context: .
          file: Dockerfile
          build-args: |
            VERSION=${{ matrix.version }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Mark packages as pushed
        if: github.event_name != 'pull_request' && steps.cache-base-tarballs-state.outputs.cache-hit != 'true' && steps.packages-pushed-cache.outputs.cache-hit != 'true'
        run: echo "pushed" > .packages-pushed-sentinel

      - name: Build and test docker
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          push: false
          load: false
          platforms: ${{ env.docker_platforms }}
          context: .
          file: Dockerfile
          build-args: |
            VERSION=${{ matrix.version }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
